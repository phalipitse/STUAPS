name: Build Android app

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "android-twa/**"
      - ".github/workflows/build-android.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-twa
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android.keystore

      - name: Build signed release .aab
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: android
        run: ./gradlew bundleRelease --stacktrace

      - name: Build signed release .apk (for direct testing / Huawei AppGallery)
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: android
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload .aab (Google Play)
        uses: actions/upload-artifact@v4
        with:
          name: stuaps-release-aab
          path: android-twa/app/build/outputs/bundle/release/*.aab

      - name: Upload .apk (Huawei AppGallery / direct install)
        uses: actions/upload-artifact@v4
        with:
          name: stuaps-release-apk
          path: android-twa/app/build/outputs/apk/release/*.apk
